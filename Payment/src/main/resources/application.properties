spring.application.name=payment
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/Payment
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.default_schema=payments

# JPA Configuration
spring.jpa.database=postgresql
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Server Kafka
spring.kafka.bootstrap-servers=172.29.191.138:9092
# Consumer group ID (wajib beda tiap service agar tidak saling rebutan message)
spring.kafka.consumer.group-id=payment-service-group
# Atur auto offset (bisa earliest untuk baca dari awal jika belum pernah)
spring.kafka.consumer.auto-offset-reset=earliest
# Deserializer untuk key & value
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer